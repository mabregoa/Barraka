<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Turnos de barra</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #667085;
      --line: #e4e7ec;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --ok: #15803d;
      --warning: #f59e0b;
      --radius: 18px;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #eef6ff, var(--bg) 42%);
      color: var(--text);
    }

    header {
      padding: 32px 18px 18px;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0 auto;
      max-width: 720px;
      color: var(--muted);
      line-height: 1.5;
    }

    main {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto 44px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin: 18px 0;
      flex-wrap: wrap;
    }

    .status {
      color: var(--muted);
      font-size: 0.95rem;
    }

    button, input {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-weight: 700;
      transition: transform .15s ease, background .15s ease, opacity .15s ease;
    }

    button:hover { background: var(--primary-dark); transform: translateY(-1px); }
    button:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    button.secondary { background: #eef2ff; color: #1e40af; }
    button.secondary:hover { background: #dbeafe; }
    button.danger { background: var(--danger); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(8px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .day-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }

    .day-title h2 {
      margin: 0;
      font-size: 1.25rem;
    }

    .date {
      color: var(--muted);
      font-size: .95rem;
      white-space: nowrap;
    }

    .shift {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-top: 12px;
      background: #fff;
    }

    .shift-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .shift-name {
      font-weight: 800;
      font-size: 1.05rem;
    }

    .time { color: var(--muted); margin-top: 2px; }

    .badge {
      border-radius: 999px;
      padding: 6px 10px;
      font-weight: 800;
      font-size: .85rem;
      background: #ecfdf3;
      color: var(--ok);
      white-space: nowrap;
    }

    .badge.full {
      background: #fef2f2;
      color: var(--danger);
    }

    .names {
      margin: 12px 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .names li {
      background: #f2f4f7;
      border: 1px solid #e4e7ec;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: .92rem;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
      margin: 12px 0;
    }

    dialog {
      border: 0;
      border-radius: 22px;
      padding: 0;
      width: min(520px, calc(100% - 28px));
      box-shadow: 0 24px 80px rgba(15, 23, 42, .35);
    }

    dialog::backdrop { background: rgba(15, 23, 42, .45); }

    .modal {
      padding: 22px;
      background: white;
    }

    .modal h3 { margin: 0 0 6px; font-size: 1.4rem; }
    .modal p { margin: 0 0 18px; color: var(--muted); }

    label {
      display: block;
      font-weight: 700;
      margin: 12px 0 6px;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      background: white;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      margin-top: 18px;
    }

    .panel {
      margin: 22px 0;
    }

    .panel h2 { margin-top: 0; }

    .my-shift {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
      border-top: 1px solid var(--line);
      padding: 12px 0;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: #111827;
      color: white;
      border-radius: 999px;
      padding: 12px 18px;
      box-shadow: var(--shadow);
      display: none;
      z-index: 10;
      max-width: calc(100% - 28px);
      text-align: center;
    }

    .toast.show { display: block; }

    @media (max-width: 640px) {
      .my-shift { grid-template-columns: 1fr; }
      .actions { justify-content: stretch; }
      .actions button { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Turnos de barra</h1>
    <p class="subtitle">Apúntate a los turnos disponibles. Solo se muestran públicamente los nombres de las personas apuntadas.</p>
  </header>

  <main>
    <section class="topbar">
      <div class="status" id="status">Cargando turnos...</div>
      <button class="secondary" id="reloadBtn">Actualizar</button>
    </section>

    <section class="grid" id="shiftGrid"></section>

    <section class="card panel">
      <h2>Mis turnos</h2>
      <p class="subtitle" style="margin:0 0 16px;">Introduce tus datos para ver, cambiar o borrar tus inscripciones.</p>
      <form id="myForm">
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px;">
          <div>
            <label for="myEmail">Email</label>
            <input id="myEmail" type="email" required autocomplete="email" />
          </div>
          <div>
            <label for="myApellido">Apellido</label>
            <input id="myApellido" required autocomplete="family-name" />
          </div>
          <div>
            <label for="myDni">DNI</label>
            <input id="myDni" required />
          </div>
        </div>
        <div class="actions" style="justify-content:flex-start;">
          <button type="submit">Ver mis turnos</button>
        </div>
      </form>
      <div id="myShifts"></div>
    </section>
  </main>

  <dialog id="signupDialog">
    <form method="dialog" class="modal" id="signupForm">
      <h3>Apuntarme</h3>
      <p id="signupShiftText"></p>
      <input type="hidden" id="signupShiftId" />
      <label for="nombre">Nombre</label>
      <input id="nombre" required autocomplete="given-name" />
      <label for="apellido">Apellido</label>
      <input id="apellido" required autocomplete="family-name" />
      <label for="email">Email</label>
      <input id="email" type="email" required autocomplete="email" />
      <label for="dni">DNI</label>
      <input id="dni" required />
      <div class="actions">
        <button type="button" class="secondary" onclick="signupDialog.close()">Cancelar</button>
        <button type="submit">Confirmar inscripción</button>
      </div>
    </form>
  </dialog>

  <dialog id="changeDialog">
    <form method="dialog" class="modal" id="changeForm">
      <h3>Cambiar turno</h3>
      <p id="changeShiftText"></p>
      <input type="hidden" id="changeInscriptionId" />
      <label for="newShiftId">Nuevo turno</label>
      <select id="newShiftId" required></select>
      <div class="actions">
        <button type="button" class="secondary" onclick="changeDialog.close()">Cancelar</button>
        <button type="submit">Cambiar</button>
      </div>
    </form>
  </dialog>

  <div class="toast" id="toast"></div>

  <script>
    // 1) Sustituye esta URL por la URL de despliegue de tu Google Apps Script.
    const API_URL = "https://script.google.com/macros/s/AKfycbzHf4BF7RZpMQ75rTgBW5tfvKJy_M6VqQ6qS2ocEoM30yNJyOslAiMNI1mTJg3-Q1eg/exec";

    const state = {
      shifts: [],
      myIdentity: null,
      myInscriptions: []
    };

    const $ = (id) => document.getElementById(id);

    function showToast(message) {
      const toast = $("toast");
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3200);
    }

    function normalizeDateLabel(isoDate) {
      const date = new Date(`${isoDate}T12:00:00`);
      return new Intl.DateTimeFormat("es-ES", { day: "2-digit", month: "long" }).format(date);
    }

    async function api(action, payload = {}, method = "POST") {
      if (!API_URL || API_URL.includes("PON_AQUI")) {
        throw new Error("Falta configurar la URL de Google Apps Script en index.html.");
      }

      if (method === "GET") {
        const url = new URL(API_URL);
        url.searchParams.set("action", action);
        Object.entries(payload).forEach(([key, value]) => url.searchParams.set(key, value));
        const response = await fetch(url.toString());
        const data = await response.json();
        if (!data.ok) throw new Error(data.error || "Error desconocido");
        return data;
      }

      const response = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action, ...payload }),
        headers: { "Content-Type": "text/plain;charset=utf-8" }
      });
      const data = await response.json();
      if (!data.ok) throw new Error(data.error || "Error desconocido");
      return data;
    }

    async function loadData() {
      try {
        $("status").textContent = "Cargando turnos...";
        const data = await api("getData", {}, "GET");
        state.shifts = data.turnos || [];
        renderShifts();
        $("status").textContent = `Actualizado. ${state.shifts.length} turnos cargados.`;
      } catch (error) {
        $("status").textContent = error.message;
        showToast(error.message);
      }
    }

    function groupByDate(shifts) {
      return shifts.reduce((acc, shift) => {
        acc[shift.fecha] ||= [];
        acc[shift.fecha].push(shift);
        return acc;
      }, {});
    }

    function renderShifts() {
      const grid = $("shiftGrid");
      grid.innerHTML = "";
      const grouped = groupByDate(state.shifts);

      Object.entries(grouped).forEach(([fecha, shifts]) => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="day-title">
            <h2>${shifts[0].dia || ""}</h2>
            <span class="date">${normalizeDateLabel(fecha)}</span>
          </div>
        `;

        shifts.forEach((shift) => {
          const libres = Number(shift.plazas) - Number(shift.inscritos.length);
          const full = libres <= 0;
          const people = shift.inscritos.length
            ? `<ul class="names">${shift.inscritos.map(p => `<li>${escapeHtml(p.nombre)} ${escapeHtml(p.apellido)}</li>`).join("")}</ul>`
            : `<p class="empty">Todavía no hay nadie apuntado.</p>`;

          const div = document.createElement("div");
          div.className = "shift";
          div.innerHTML = `
            <div class="shift-head">
              <div>
                <div class="shift-name">${escapeHtml(shift.tipo)}</div>
                <div class="time">${escapeHtml(shift.hora_inicio)}–${escapeHtml(shift.hora_fin)}</div>
              </div>
              <span class="badge ${full ? "full" : ""}">${full ? "Completo" : `${libres}/${shift.plazas} libres`}</span>
            </div>
            ${people}
            <button ${full ? "disabled" : ""} data-signup="${shift.id_turno}">${full ? "Turno completo" : "Apuntarme"}</button>
          `;
          card.appendChild(div);
        });

        grid.appendChild(card);
      });

      document.querySelectorAll("[data-signup]").forEach(button => {
        button.addEventListener("click", () => openSignup(button.dataset.signup));
      });
    }

    function openSignup(idTurno) {
      const shift = state.shifts.find(s => s.id_turno === idTurno);
      if (!shift) return;
      $("signupShiftId").value = idTurno;
      $("signupShiftText").textContent = `${shift.dia}, ${normalizeDateLabel(shift.fecha)} · ${shift.tipo} · ${shift.hora_inicio}–${shift.hora_fin}`;
      $("signupForm").reset();
      $("signupShiftId").value = idTurno;
      signupDialog.showModal();
    }

    async function signup(event) {
      event.preventDefault();
      try {
        await api("inscribir", {
          id_turno: $("signupShiftId").value,
          nombre: $("nombre").value,
          apellido: $("apellido").value,
          email: $("email").value,
          dni: $("dni").value
        });
        signupDialog.close();
        showToast("Inscripción realizada.");
        await loadData();
      } catch (error) {
        showToast(error.message);
      }
    }

    async function loadMyShifts(event) {
      event.preventDefault();
      state.myIdentity = {
        email: $("myEmail").value,
        apellido: $("myApellido").value,
        dni: $("myDni").value
      };
      try {
        const data = await api("misTurnos", state.myIdentity);
        state.myInscriptions = data.inscripciones || [];
        renderMyShifts();
      } catch (error) {
        showToast(error.message);
      }
    }

    function renderMyShifts() {
      const box = $("myShifts");
      if (!state.myInscriptions.length) {
        box.innerHTML = `<p class="empty">No hay inscripciones activas para esos datos.</p>`;
        return;
      }

      box.innerHTML = state.myInscriptions.map(item => `
        <div class="my-shift">
          <div>
            <strong>${escapeHtml(item.dia)}, ${normalizeDateLabel(item.fecha)} · ${escapeHtml(item.tipo)}</strong><br />
            <span class="time">${escapeHtml(item.hora_inicio)}–${escapeHtml(item.hora_fin)}</span>
          </div>
          <button class="secondary" data-change="${item.id_inscripcion}">Cambiar</button>
          <button class="danger" data-delete="${item.id_inscripcion}">Borrar</button>
        </div>
      `).join("");

      document.querySelectorAll("[data-change]").forEach(button => {
        button.addEventListener("click", () => openChange(button.dataset.change));
      });
      document.querySelectorAll("[data-delete]").forEach(button => {
        button.addEventListener("click", () => deleteInscription(button.dataset.delete));
      });
    }

    function openChange(idInscripcion) {
      const current = state.myInscriptions.find(i => i.id_inscripcion === idInscripcion);
      if (!current) return;
      $("changeInscriptionId").value = idInscripcion;
      $("changeShiftText").textContent = `Vas a cambiar: ${current.dia}, ${normalizeDateLabel(current.fecha)} · ${current.tipo}`;

      const options = state.shifts
        .filter(shift => shift.id_turno !== current.id_turno)
        .filter(shift => Number(shift.inscritos.length) < Number(shift.plazas))
        .map(shift => `<option value="${shift.id_turno}">${shift.dia}, ${normalizeDateLabel(shift.fecha)} · ${shift.tipo} · ${shift.hora_inicio}–${shift.hora_fin}</option>`)
        .join("");

      $("newShiftId").innerHTML = options || `<option value="">No hay turnos disponibles</option>`;
      changeDialog.showModal();
    }

    async function changeInscription(event) {
      event.preventDefault();
      try {
        await api("cambiar", {
          ...state.myIdentity,
          id_inscripcion: $("changeInscriptionId").value,
          nuevo_id_turno: $("newShiftId").value
        });
        changeDialog.close();
        showToast("Turno cambiado.");
        await loadData();
        const data = await api("misTurnos", state.myIdentity);
        state.myInscriptions = data.inscripciones || [];
        renderMyShifts();
      } catch (error) {
        showToast(error.message);
      }
    }

    async function deleteInscription(idInscripcion) {
      const ok = confirm("¿Seguro que quieres borrar esta inscripción?");
      if (!ok) return;
      try {
        await api("borrar", { ...state.myIdentity, id_inscripcion: idInscripcion });
        showToast("Inscripción borrada.");
        await loadData();
        const data = await api("misTurnos", state.myIdentity);
        state.myInscriptions = data.inscripciones || [];
        renderMyShifts();
      } catch (error) {
        showToast(error.message);
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    $("reloadBtn").addEventListener("click", loadData);
    $("signupForm").addEventListener("submit", signup);
    $("myForm").addEventListener("submit", loadMyShifts);
    $("changeForm").addEventListener("submit", changeInscription);

    loadData();
  </script>
</body>
</html>

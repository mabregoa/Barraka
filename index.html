<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Turnos de barra / Barra txandak</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #667085;
      --line: #e4e7ec;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --ok: #15803d;
      --warning: #f59e0b;
      --radius: 18px;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #eef6ff, var(--bg) 42%);
      color: var(--text);
    }

    /* ── Header ── */
    header {
      padding: 28px 18px 16px;
      text-align: center;
      position: relative;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1120px;
      margin: 0 auto 16px;
      flex-wrap: wrap;
      gap: 10px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.8rem, 5vw, 3rem);
      letter-spacing: -0.04em;
      flex: 1;
      text-align: center;
    }

    .subtitle {
      margin: 0 auto;
      max-width: 720px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── Lang toggle ── */
    .lang-toggle {
      display: flex;
      background: #eef2ff;
      border-radius: 999px;
      padding: 3px;
      gap: 2px;
      flex-shrink: 0;
    }

    .lang-toggle button {
      background: transparent;
      color: var(--primary);
      font-weight: 700;
      font-size: .85rem;
      padding: 6px 14px;
      border-radius: 999px;
      transition: background .2s, color .2s, transform 0s;
    }

    .lang-toggle button:hover { background: #dbeafe; transform: none; }
    .lang-toggle button.active { background: var(--primary); color: white; }

    /* ── Mis turnos CTA ── */
    .my-shifts-cta {
      display: flex;
      align-items: center;
      gap: 8px;
      background: white;
      border: 1.5px solid var(--line);
      border-radius: 999px;
      padding: 8px 18px;
      font-weight: 700;
      font-size: .95rem;
      color: var(--primary);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(37,99,235,.10);
      transition: box-shadow .2s, background .15s, transform .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .my-shifts-cta:hover {
      background: #eef2ff;
      box-shadow: 0 4px 16px rgba(37,99,235,.18);
      transform: translateY(-1px);
    }
    .my-shifts-cta svg { flex-shrink: 0; }

    /* ── Main ── */
    main {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto 44px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin: 18px 0;
      flex-wrap: wrap;
    }

    .status {
      color: var(--muted);
      font-size: 0.95rem;
    }

    button, input { font: inherit; }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-weight: 700;
      transition: transform .15s ease, background .15s ease, opacity .15s ease;
    }

    button:hover { background: var(--primary-dark); transform: translateY(-1px); }
    button:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    button.secondary { background: #eef2ff; color: #1e40af; }
    button.secondary:hover { background: #dbeafe; }
    button.danger { background: var(--danger); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(8px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      animation: fadeIn .35s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .day-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }

    .day-title h2 { margin: 0; font-size: 1.25rem; }

    .date {
      color: var(--muted);
      font-size: .95rem;
      white-space: nowrap;
    }

    .shift {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-top: 12px;
      background: #fff;
    }

    .shift-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .shift-name { font-weight: 800; font-size: 1.05rem; }
    .time { color: var(--muted); margin-top: 2px; }

    .badge {
      border-radius: 999px;
      padding: 6px 10px;
      font-weight: 800;
      font-size: .85rem;
      background: #ecfdf3;
      color: var(--ok);
      white-space: nowrap;
    }

    .badge.full { background: #fef2f2; color: var(--danger); }

    .names {
      margin: 12px 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .names li {
      background: #f2f4f7;
      border: 1px solid #e4e7ec;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: .92rem;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
      margin: 12px 0;
    }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { margin: 0; font-size: 1.1rem; }

    /* ── Mis turnos panel ── */
    .panel {
      margin: 22px 0;
    }
    .panel h2 { margin-top: 0; }

    .my-shift {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
      border-top: 1px solid var(--line);
      padding: 12px 0;
    }

    /* ── Dialogs ── */
    dialog {
      border: 0;
      border-radius: 22px;
      padding: 0;
      width: min(520px, calc(100% - 28px));
      box-shadow: 0 24px 80px rgba(15, 23, 42, .35);
    }

    dialog::backdrop { background: rgba(15, 23, 42, .45); }

    .modal { padding: 22px; background: white; }
    .modal h3 { margin: 0 0 6px; font-size: 1.4rem; }
    .modal p { margin: 0 0 18px; color: var(--muted); }

    /* Confirm summary box */
    .confirm-box {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 18px;
      font-size: .97rem;
      line-height: 1.6;
    }
    .confirm-box strong { display: block; margin-bottom: 4px; color: var(--primary-dark); }

    label {
      display: block;
      font-weight: 700;
      margin: 12px 0 6px;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      background: white;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      margin-top: 18px;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: #111827;
      color: white;
      border-radius: 999px;
      padding: 12px 18px;
      box-shadow: var(--shadow);
      display: none;
      z-index: 10;
      max-width: calc(100% - 28px);
      text-align: center;
    }
    .toast.show { display: block; }

    @media (max-width: 640px) {
      .my-shift { grid-template-columns: 1fr; }
      .actions { justify-content: stretch; }
      .actions button { width: 100%; }
      .header-top { flex-direction: column; align-items: center; }
      h1 { text-align: center; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-top">
      <!-- Lang toggle -->
      <div class="lang-toggle">
        <button id="btnEs" class="active" onclick="setLang('es')">ES</button>
        <button id="btnEu" onclick="setLang('eu')">EU</button>
      </div>

      <h1 id="mainTitle">Turnos de barra</h1>

      <!-- Mis turnos CTA -->
      <button class="my-shifts-cta" onclick="scrollToMyShifts()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <span id="myShiftsCta">Mis turnos</span>
      </button>
    </div>

    <p class="subtitle" id="headerSubtitle">Apúntate a los turnos disponibles. Solo se muestran públicamente los nombres de las personas apuntadas.</p>
  </header>

  <main>
    <section class="topbar">
      <div class="status" id="status">Cargando turnos...</div>
      <button class="secondary" id="reloadBtn">Actualizar</button>
    </section>

    <section class="grid" id="shiftGrid"></section>

    <!-- Mis turnos panel -->
    <section class="card panel" id="myPanel">
      <h2 id="myPanelTitle">Mis turnos</h2>
      <p class="subtitle" id="myPanelSubtitle" style="margin:0 0 16px;">Introduce tus datos para ver, cambiar o borrar tus inscripciones.</p>
      <div id="myForm">
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px;">
          <div>
            <label for="myEmail" id="labelMyEmail">Email</label>
            <input id="myEmail" type="email" required autocomplete="email" />
          </div>
          <div>
            <label for="myApellido" id="labelMyApellido">Apellido</label>
            <input id="myApellido" required autocomplete="family-name" />
          </div>
          <div>
            <label for="myDni" id="labelMyDni">DNI / NAN</label>
            <input id="myDni" required />
          </div>
        </div>
        <div class="actions" style="justify-content:flex-start; margin-top: 14px;">
          <button id="myFormBtn" onclick="loadMyShifts()">Ver mis turnos</button>
        </div>
      </div>
      <div id="myShifts"></div>
    </section>
  </main>

  <!-- Dialog: apuntarse -->
  <dialog id="signupDialog">
    <div class="modal" id="signupModal">
      <h3 id="dlgSignupTitle">Apuntarme</h3>
      <div class="confirm-box" id="signupConfirmBox">
        <strong id="signupConfirmLabel">Turno seleccionado:</strong>
        <span id="signupShiftText"></span>
      </div>
      <input type="hidden" id="signupShiftId" />
      <label for="nombre" id="labelNombre">Nombre</label>
      <input id="nombre" required autocomplete="given-name" />
      <label for="apellido" id="labelApellido">Apellido</label>
      <input id="apellido" required autocomplete="family-name" />
      <label for="email" id="labelEmail">Email</label>
      <input id="email" type="email" required autocomplete="email" />
      <label for="dni" id="labelDni">DNI / NAN</label>
      <input id="dni" required />
      <div class="actions">
        <button type="button" class="secondary" id="dlgSignupCancel" onclick="signupDialog.close()">Cancelar</button>
        <button type="button" id="dlgSignupConfirm" onclick="signup()">Confirmar inscripción</button>
      </div>
    </div>
  </dialog>

  <!-- Dialog: cambiar turno -->
  <dialog id="changeDialog">
    <div class="modal" id="changeModal">
      <h3 id="dlgChangeTitle">Cambiar turno</h3>
      <p id="changeShiftText"></p>
      <input type="hidden" id="changeInscriptionId" />
      <label for="newShiftId" id="labelNewShift">Nuevo turno</label>
      <select id="newShiftId" required></select>
      <div class="actions">
        <button type="button" class="secondary" id="dlgChangeCancel" onclick="changeDialog.close()">Cancelar</button>
        <button type="button" id="dlgChangeConfirm" onclick="changeInscription()">Cambiar</button>
      </div>
    </div>
  </dialog>

  <div class="toast" id="toast"></div>

  <script>
    // 1) Sustituye esta URL por la URL de despliegue de tu Google Apps Script.
    const API_URL = "https://script.google.com/macros/s/AKfycbzHf4BF7RZpMQ75rTgBW5tfvKJy_M6VqQ6qS2ocEoM30yNJyOslAiMNI1mTJg3-Q1eg/exec";

    // ── Traducciones ─────────────────────────────────────────────────────────
    const TEXTS = {
      es: {
        mainTitle: "Turnos de barra",
        headerSubtitle: "Apúntate a los turnos disponibles. Solo se muestran públicamente los nombres de las personas apuntadas.",
        myShiftsCta: "Mis turnos",
        reloadBtn: "Actualizar",
        statusLoading: "Cargando turnos...",
        statusLoaded: n => `Actualizado. ${n} turnos cargados.`,
        myPanelTitle: "Mis turnos",
        myPanelSubtitle: "Introduce tus datos para ver, cambiar o borrar tus inscripciones.",
        labelMyEmail: "Email",
        labelMyApellido: "Apellido",
        labelMyDni: "DNI / NAN",
        myFormBtn: "Ver mis turnos",
        dlgSignupTitle: "Apuntarme",
        signupConfirmLabel: "Turno seleccionado:",
        labelNombre: "Nombre",
        labelApellido: "Apellido",
        labelEmail: "Email",
        labelDni: "DNI / NAN",
        dlgSignupCancel: "Cancelar",
        dlgSignupConfirm: "Confirmar inscripción",
        dlgChangeTitle: "Cambiar turno",
        labelNewShift: "Nuevo turno",
        dlgChangeCancel: "Cancelar",
        dlgChangeConfirm: "Cambiar",
        badgeFull: "Completo",
        badgeFree: (free, total) => `${free}/${total} libres`,
        btnSignup: "Apuntarme",
        btnFull: "Turno completo",
        noSignups: "Todavía no hay nadie apuntado.",
        noAvailable: "No hay turnos disponibles",
        toastSignupOk: "Inscripción realizada.",
        toastChangeOk: "Turno cambiado.",
        toastDeleteOk: "Inscripción borrada.",
        confirmDelete: "¿Seguro que quieres borrar esta inscripción?",
        btnChange: "Cambiar",
        btnDelete: "Borrar",
        noMyShifts: "No hay inscripciones activas para esos datos.",
        emptyStateTitle: "No hay turnos disponibles",
        emptyStateText: "Vuelve más tarde o pulsa Actualizar.",
        changePrefix: "Vas a cambiar:",
      },
      eu: {
        mainTitle: "Barra txandak",
        headerSubtitle: "Eskura dauden txandetan izena eman. Publikoki izen-abizenak bakarrik agertzen dira.",
        myShiftsCta: "Nire txandak",
        reloadBtn: "Eguneratu",
        statusLoading: "Txandak kargatzen...",
        statusLoaded: n => `Eguneratuta. ${n} txanda kargatuta.`,
        myPanelTitle: "Nire txandak",
        myPanelSubtitle: "Sartu zure datuak txandak ikusi, aldatu edo ezabatzeko.",
        labelMyEmail: "Helbide elektronikoa",
        labelMyApellido: "Abizena",
        labelMyDni: "NAN / DNI",
        myFormBtn: "Nire txandak ikusi",
        dlgSignupTitle: "Izena eman",
        signupConfirmLabel: "Hautatutako txanda:",
        labelNombre: "Izena",
        labelApellido: "Abizena",
        labelEmail: "Helbide elektronikoa",
        labelDni: "NAN / DNI",
        dlgSignupCancel: "Utzi",
        dlgSignupConfirm: "Izena berretsi",
        dlgChangeTitle: "Txanda aldatu",
        labelNewShift: "Txanda berria",
        dlgChangeCancel: "Utzi",
        dlgChangeConfirm: "Aldatu",
        badgeFull: "Beteta",
        badgeFree: (free, total) => `${free}/${total} libre`,
        btnSignup: "Izena eman",
        btnFull: "Txanda beteta",
        noSignups: "Oraindik inor ez dago izena emanda.",
        noAvailable: "Ez dago txandarik eskuragarri",
        toastSignupOk: "Izena emanda.",
        toastChangeOk: "Txanda aldatuta.",
        toastDeleteOk: "Izena ezabatuta.",
        confirmDelete: "Ziur zaude izena ezabatu nahi duzula?",
        btnChange: "Aldatu",
        btnDelete: "Ezabatu",
        noMyShifts: "Ez dago inskripzio aktiborik datu horiekin.",
        emptyStateTitle: "Ez dago txandarik eskuragarri",
        emptyStateText: "Geroago itzuli edo sakatu Eguneratu.",
        changePrefix: "Aldatuko duzu:",
      }
    };

    let lang = "es";

    function t(key, ...args) {
      const val = TEXTS[lang][key];
      return typeof val === "function" ? val(...args) : val;
    }

    function setLang(l) {
      lang = l;
      document.documentElement.lang = l;
      document.getElementById("btnEs").classList.toggle("active", l === "es");
      document.getElementById("btnEu").classList.toggle("active", l === "eu");
      applyTexts();
      renderShifts();
      if (state.myInscriptions.length) renderMyShifts();
    }

    function applyTexts() {
      const ids = [
        "mainTitle","headerSubtitle","myShiftsCta","myPanelTitle","myPanelSubtitle",
        "labelMyEmail","labelMyApellido","labelMyDni","myFormBtn",
        "dlgSignupTitle","signupConfirmLabel","labelNombre","labelApellido","labelEmail","labelDni",
        "dlgSignupCancel","dlgSignupConfirm",
        "dlgChangeTitle","labelNewShift","dlgChangeCancel","dlgChangeConfirm"
      ];
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = t(id);
      });
      document.getElementById("reloadBtn").textContent = t("reloadBtn");
      const s = document.getElementById("status");
      if (s && s.dataset.loaded) s.textContent = t("statusLoaded", s.dataset.count || 0);
    }

    // ── State ─────────────────────────────────────────────────────────────────
    const state = { shifts: [], myIdentity: null, myInscriptions: [] };

    const $ = (id) => document.getElementById(id);

    function scrollToMyShifts() {
      $("myPanel").scrollIntoView({ behavior: "smooth", block: "start" });
      $("myEmail").focus();
    }

    function showToast(message) {
      const toast = $("toast");
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3200);
    }

    function normalizeDateLabel(isoDate) {
      const date = new Date(`${isoDate}T12:00:00`);
      return new Intl.DateTimeFormat(lang === "eu" ? "eu-ES" : "es-ES", { day: "2-digit", month: "long" }).format(date);
    }

    async function api(action, payload = {}, method = "POST") {
      if (!API_URL || API_URL.includes("PON_AQUI")) {
        throw new Error("Falta configurar la URL de Google Apps Script en index.html.");
      }
      if (method === "GET") {
        const url = new URL(API_URL);
        url.searchParams.set("action", action);
        Object.entries(payload).forEach(([k, v]) => url.searchParams.set(k, v));
        const r = await fetch(url.toString());
        const d = await r.json();
        if (!d.ok) throw new Error(d.error || "Error desconocido");
        return d;
      }
      const r = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action, ...payload }),
        headers: { "Content-Type": "text/plain;charset=utf-8" }
      });
      const d = await r.json();
      if (!d.ok) throw new Error(d.error || "Error desconocido");
      return d;
    }

    async function loadData() {
      try {
        const statusEl = $("status");
        statusEl.textContent = t("statusLoading");
        const data = await api("getData", {}, "GET");
        state.shifts = data.turnos || [];
        renderShifts();
        statusEl.textContent = t("statusLoaded", state.shifts.length);
        statusEl.dataset.loaded = "1";
        statusEl.dataset.count = state.shifts.length;
      } catch (error) {
        $("status").textContent = error.message;
        showToast(error.message);
      }
    }

    function groupByDate(shifts) {
      return shifts.reduce((acc, shift) => {
        acc[shift.fecha] ||= [];
        acc[shift.fecha].push(shift);
        return acc;
      }, {});
    }

    function renderShifts() {
      const grid = $("shiftGrid");
      grid.innerHTML = "";
      const grouped = groupByDate(state.shifts);
      const entries = Object.entries(grouped);

      if (!entries.length) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🍺</div>
            <p><strong>${t("emptyStateTitle")}</strong></p>
            <p>${t("emptyStateText")}</p>
          </div>`;
        return;
      }

      entries.forEach(([fecha, shifts], cardIndex) => {
        const card = document.createElement("article");
        card.className = "card";
        card.style.animationDelay = `${cardIndex * 60}ms`;
        card.innerHTML = `
          <div class="day-title">
            <h2>${shifts[0].dia || ""}</h2>
            <span class="date">${normalizeDateLabel(fecha)}</span>
          </div>
        `;

        shifts.forEach((shift) => {
          const libres = Number(shift.plazas) - Number(shift.inscritos.length);
          const full = libres <= 0;
          const people = shift.inscritos.length
            ? `<ul class="names">${shift.inscritos.map(p => `<li>${escapeHtml(p.nombre)} ${escapeHtml(p.apellido)}</li>`).join("")}</ul>`
            : `<p class="empty">${t("noSignups")}</p>`;

          const div = document.createElement("div");
          div.className = "shift";
          div.innerHTML = `
            <div class="shift-head">
              <div>
                <div class="shift-name">${escapeHtml(shift.tipo)}</div>
                <div class="time">${escapeHtml(shift.hora_inicio)}–${escapeHtml(shift.hora_fin)}</div>
              </div>
              <span class="badge ${full ? "full" : ""}">${full ? t("badgeFull") : t("badgeFree", libres, shift.plazas)}</span>
            </div>
            ${people}
            <button ${full ? "disabled" : ""} data-signup="${shift.id_turno}">${full ? t("btnFull") : t("btnSignup")}</button>
          `;
          card.appendChild(div);
        });

        grid.appendChild(card);
      });

      document.querySelectorAll("[data-signup]").forEach(button => {
        button.addEventListener("click", () => openSignup(button.dataset.signup));
      });
    }

    function openSignup(idTurno) {
      const shift = state.shifts.find(s => s.id_turno === idTurno);
      if (!shift) return;
      $("signupShiftId").value = idTurno;
      $("signupShiftText").textContent = `${shift.dia}, ${normalizeDateLabel(shift.fecha)} · ${shift.tipo} · ${shift.hora_inicio}–${shift.hora_fin}`;
      // Reset inputs
      ["nombre","apellido","email","dni"].forEach(id => $(id).value = "");
      applyTexts();
      signupDialog.showModal();
    }

    async function signup() {
      const nombre = $("nombre").value.trim();
      const apellido = $("apellido").value.trim();
      const email = $("email").value.trim();
      const dni = $("dni").value.trim();
      if (!nombre || !apellido || !email || !dni) return;
      try {
        await api("inscribir", {
          id_turno: $("signupShiftId").value,
          nombre, apellido, email, dni
        });
        signupDialog.close();
        showToast(t("toastSignupOk"));
        await loadData();
      } catch (error) {
        showToast(error.message);
      }
    }

    async function loadMyShifts() {
      const email = $("myEmail").value.trim();
      const apellido = $("myApellido").value.trim();
      const dni = $("myDni").value.trim();
      if (!email || !apellido || !dni) return;
      state.myIdentity = { email, apellido, dni };
      try {
        const data = await api("misTurnos", state.myIdentity);
        state.myInscriptions = data.inscripciones || [];
        renderMyShifts();
      } catch (error) {
        showToast(error.message);
      }
    }

    function renderMyShifts() {
      const box = $("myShifts");
      if (!state.myInscriptions.length) {
        box.innerHTML = `<p class="empty">${t("noMyShifts")}</p>`;
        return;
      }
      box.innerHTML = state.myInscriptions.map(item => `
        <div class="my-shift">
          <div>
            <strong>${escapeHtml(item.dia)}, ${normalizeDateLabel(item.fecha)} · ${escapeHtml(item.tipo)}</strong><br />
            <span class="time">${escapeHtml(item.hora_inicio)}–${escapeHtml(item.hora_fin)}</span>
          </div>
          <button class="secondary" data-change="${item.id_inscripcion}">${t("btnChange")}</button>
          <button class="danger" data-delete="${item.id_inscripcion}">${t("btnDelete")}</button>
        </div>
      `).join("");

      document.querySelectorAll("[data-change]").forEach(b =>
        b.addEventListener("click", () => openChange(b.dataset.change)));
      document.querySelectorAll("[data-delete]").forEach(b =>
        b.addEventListener("click", () => deleteInscription(b.dataset.delete)));
    }

    function openChange(idInscripcion) {
      const current = state.myInscriptions.find(i => i.id_inscripcion === idInscripcion);
      if (!current) return;
      $("changeInscriptionId").value = idInscripcion;
      $("changeShiftText").textContent = `${t("changePrefix")} ${current.dia}, ${normalizeDateLabel(current.fecha)} · ${current.tipo}`;
      const options = state.shifts
        .filter(s => s.id_turno !== current.id_turno)
        .filter(s => Number(s.inscritos.length) < Number(s.plazas))
        .map(s => `<option value="${s.id_turno}">${s.dia}, ${normalizeDateLabel(s.fecha)} · ${s.tipo} · ${s.hora_inicio}–${s.hora_fin}</option>`)
        .join("");
      $("newShiftId").innerHTML = options || `<option value="">${t("noAvailable")}</option>`;
      applyTexts();
      changeDialog.showModal();
    }

    async function changeInscription() {
      try {
        await api("cambiar", {
          ...state.myIdentity,
          id_inscripcion: $("changeInscriptionId").value,
          nuevo_id_turno: $("newShiftId").value
        });
        changeDialog.close();
        showToast(t("toastChangeOk"));
        await loadData();
        const data = await api("misTurnos", state.myIdentity);
        state.myInscriptions = data.inscripciones || [];
        renderMyShifts();
      } catch (error) {
        showToast(error.message);
      }
    }

    async function deleteInscription(idInscripcion) {
      const ok = confirm(t("confirmDelete"));
      if (!ok) return;
      try {
        await api("borrar", { ...state.myIdentity, id_inscripcion: idInscripcion });
        showToast(t("toastDeleteOk"));
        await loadData();
        const data = await api("misTurnos", state.myIdentity);
        state.myInscriptions = data.inscripciones || [];
        renderMyShifts();
      } catch (error) {
        showToast(error.message);
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;").replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    $("reloadBtn").addEventListener("click", loadData);

    // Init
    applyTexts();
    loadData();
  </script>
</body>
</html>
